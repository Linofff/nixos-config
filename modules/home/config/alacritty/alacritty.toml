[env]
# Alacritty uses its own terminfo. 
TERM = "alacritty"

[window]
# Translated from background_opacity 0.99
opacity = 0.98

[font]
# Translated from font_size 13.0
size = 13.0

[font.normal]
family = "Hack Nerd Font"
style = "SemiBold"

[scrolling]
history = 10000

[cursor]
# Translated from cursor_shape block
style = { shape = "Block", blinking = "Off" }

[colors.primary]
background = "#1F1F28"
foreground = "#DCD7BA"

[colors.cursor]
text   = "#1F1F28" 
cursor = "#bbc2cf"

[colors.selection]
text       = "#C8C093"
background = "#44475a"

[colors.normal]
black   = "#16161D"
red     = "#C34043"
green   = "#76946A"
yellow  = "#C0A36E"
blue    = "#7E9CD8"
magenta = "#957FB8"
cyan    = "#6A9589"
white   = "#C8C093"

[colors.bright]
black   = "#727169"
red     = "#E82424"
green   = "#98BB6C"
yellow  = "#E6C384"
blue    = "#7FB4CA"
magenta = "#938AA9"
cyan    = "#7AA89F"
white   = "#DCD7BA"

[[colors.indexed_colors]]
index = 16
color = "#FFA066"

[[colors.indexed_colors]]
index = 17
color = "#FF5D62"

$menu = wofi --show drun
$terminal = kitty
$fileManager = dolphin

$mainMod = SUPER
$mainShift = SUPER_SHIFT 

exec-once = clipse -listen

bind = $mainMod, V, exec, kitty --class clipse -e clipse; hyprctl dispatch sendshortcut "CTRL, V,"
bind = $mainShift, V, exec, kitty --class clipse -e clipse
windowrule = float, class:clipse
windowrule = size 822 652, class:clipse
windowrule = stayfocused, class:clipse
windowrule = center, class:clipse

windowrule = float, class:terminal-filechooser
windowrule = size 1500 850, class:terminal-filechooser
windowrule = center, class:terminal-filechooser

bind = $mainMod, L, exec, hyprlock
bind = $mainMod, RETURN, exec, $terminal
bind = $mainShift, F, fullscreen, 0
bind = $mainMod, F, fullscreen, 1
bind = $mainShift, S, exec, hyprshot -m region --clipboard-only
bind = $mainShift CTRL, S, exec, hyprshot -zm region -o $HOME/Pictures/Screenshots

bind = $mainMod, B, exec, firefox
bind = $mainMod, Q, exec, kitty --class fastfetch -e --hold zsh -c "fastfetch"
windowrule = float, class:fastfetch
windowrule = size 1150 650, class:fastfetch
windowrule = stayfocused, class:fastfetch
windowrule = center, class:fastfetch

bind = $mainMod, M, exit,
bind = $mainShift, C, forcekillactive,
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainShift, 1, movetoworkspace, 1
bind = $mainShift, 2, movetoworkspace, 2
bind = $mainShift, 3, movetoworkspace, 3
bind = $mainShift, 4, movetoworkspace, 4
bind = $mainShift, 5, movetoworkspace, 5
bind = $mainShift, 6, movetoworkspace, 6
bind = $mainShift, 7, movetoworkspace, 7
bind = $mainShift, 8, movetoworkspace, 8
bind = $mainShift, 9, movetoworkspace, 9
bind = $mainShift, 0, movetoworkspace, 10

# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

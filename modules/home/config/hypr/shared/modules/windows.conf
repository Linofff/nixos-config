general {
	gaps_in = 2
	gaps_out = 3

	border_size = 2

	col.active_border = rgba(7e9cd8ee) rgba(9c86bfee) 30deg
	col.inactive_border = rgba(595959aa)

	resize_on_border = false

	allow_tearing = false

	layout = dwindle
}

decoration {
	rounding = 7

	active_opacity = 1.0
	inactive_opacity = 1.0

	shadow {
		enabled = true
		range = 4
		render_power = 3
		color = rgba(1a1a1aee)
	}

	blur {
		enabled = true
		size = 3
		passes = 1

		vibrancy = 0.1696
	}
}

dwindle {
	pseudotile = true
	preserve_split = true 
}

master {
	new_status = master
}

misc {
	force_default_wallpaper = -1
	disable_hyprland_logo = true
}

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
